server:
    port: 8888 #포트 번호 변경

spring:

    # mariadb settings
    datasource:
        driver-class-name: org.mariadb.jdbc.Driver
        url: jdbc:mariadb://localhost:3306/inspire   # 마지막은 DB 이름
        username: root
        password: 123456789
    
    jpa:
        hibernate: 
            # create, create-drop, update, none
            ddl-auto:  create
        # 콘솔출력
        show-sql: true     
        properties:
            hibernate:
                # h2
                # dialect: org.hibernate.dialect.H2Dialect
                # mariadb
                dialect: org.hibernate.dialect.MariaDBDialect
                format_sql: true

  # redis
  # docker run -d --name redis-container -p 6379:6379 redis:7.2 // 도커 실행 명령
  # docker exec -it redis-container redis-cli 
  # ping
  # docker run -d --name redis-insight -p 8001:5540 redis/redisinsight:latest //브라우저로 보고 싶은 경우
  # http://localhost:8001
  # Host: redis 또는 host.docker.internal , port: 6379
    data:
        redis:
            host: localhost
            port: 6379
            password:
            timeout: 6000ms

